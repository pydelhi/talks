name: Proposal Autoresponder

on:
  issues:
    types: [opened, labeled]

permissions: {}

jobs:
  autorespond:
    runs-on: ubuntu-latest
    if: contains(github.event.issue.labels.*.name, 'proposal')
    permissions:
      issues: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check if already responded
        id: check
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number
            });

            // Check if bot has already commented
            const botComment = comments.data.find(comment =>
              comment.user.type === 'Bot' &&
              comment.body.includes('Thank you for submitting your proposal')
            );

            return { alreadyResponded: !!botComment };
          result-encoding: string

      - name: Post welcome comment
        if: fromJSON(steps.check.outputs.result).alreadyResponded == false
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read the template file
            const templatePath = path.join(process.env.GITHUB_WORKSPACE, '.github', 'proposal-response-template.md');
            let template = fs.readFileSync(templatePath, 'utf8');

            // Replace placeholders
            const comment = template.replace('{author}', context.payload.issue.user.login);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: comment
            });
